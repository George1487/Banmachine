x-service-defaults: &service_defaults
  restart: unless-stopped
  env_file:
    - .env
  networks:
    - app_net

services:
  db:
    <<: *service_defaults
    image: postgres:17
    hostname: db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:${PGDATA}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    image: migrate/migrate:v4.15.2
    env_file:
      - .env
    command: -path=/migrations -database "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable" up
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    networks:
      - app_net

  analysis-worker:
    <<: *service_defaults
    build:
      context: ./analysisWorker
      dockerfile: Dockerfile
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-bandabenzogang/banmashine}/analysis-worker:${ANALYSIS_IMAGE_TAG:-latest}
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  minio:
    <<: *service_defaults
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:latest
    env_file:
      - .env
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb -p local/${MINIO_BUCKET} || true;
      mc anonymous set none local/${MINIO_BUCKET} || true;
      exit 0;
      "
    networks:
      - app_net

  ingest-worker:
    <<: *service_defaults
    build:
      context: .
      dockerfile: Dockerfile.ingestWorker
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-bandabenzogang/banmashine}/ingest-worker:${INGEST_IMAGE_TAG:-latest}
    container_name: ingest_worker
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DB_DSN: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_USE_SSL: false

  frontend:
    <<: *service_defaults
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-bandabenzogang/banmashine}/frontend:${FRONTEND_IMAGE_TAG:-latest}
    ports:
      - "${FRONTEND_PORT:-8080}:80"

  backend-dotnet:
    <<: *service_defaults
    build:
      context: ./ApiService
      dockerfile: Dockerfile
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-bandabenzogang/banmashine}/backend-dotnet:${DOTNET_IMAGE_TAG:-latest}
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Minio__Endpoint: minio:9000
      Minio__AccessKey: ${MINIO_ROOT_USER}
      Minio__SecretKey: ${MINIO_ROOT_PASSWORD}
      Minio__Bucket: ${MINIO_BUCKET}
      AuthSettings__SecretKey: ${AUTH_SECRET_KEY}
    ports:
      - "${DOTNET_PORT:-8082}:8080"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
volumes:
  postgres_data:
  minio_data:

networks:
  app_net:
    driver: bridge
